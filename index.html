        .header { text-align: center; color: white; margin-bottom: 30px; }

        .header p { font-size: 1.1em; opacity: 0.9; }
        
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .search-input-wrapper { display: flex; gap: 15px; margin-bottom: 15px; }
        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .search-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .search-btn:hover { transform: translateY(-2px); }
        
        .stats {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .stats-value { font-size: 2em; font-weight: 700; color: #667eea; margin: 10px 0; }
        
        .results {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 200px;
        }
        .result-count {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .no-results { text-align: center; padding: 60px 20px; color: #999; }
        .no-results-icon { font-size: 4em; margin-bottom: 20px; }
        
        .company-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        .company-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .company-name { font-size: 1.3em; font-weight: 700; color: #333; }
        .company-badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .company-details { display: grid; gap: 10px; }
        .detail-row { display: flex; align-items: flex-start; gap: 10px; }
        .detail-icon { color: #667eea; font-weight: bold; min-width: 20px; }
        .detail-label { font-weight: 600; color: #666; min-width: 80px; }
        .detail-value { color: #333; flex: 1; }
        .phone-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
        }
        .phone-link:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .search-input-wrapper { flex-direction: column; }
        }

</head>

<div class="container">

// 검색 함수
function search() {
    const searchInput = document.getElementById('searchInput').value.trim();
    const resultsDiv = document.getElementById('results');

    if (!searchInput) {
        resultsDiv.innerHTML = `
            <div class="no-results">
                <div class="no-results-icon">⚠️</div>
                <div style="font-size: 1.2em; color: #666;">검색어를 입력해주세요</div>
            </div>
        `;
        return;
    }

    // 검색어에서 숫자만 추출
    const searchNumbers = searchInput.replace(/[^0-9]/g, '');
    const searchLower = searchInput.toLowerCase();

    console.log('검색어:', searchInput);
    console.log('숫자만:', searchNumbers);

    // 검색 실행
    let results = companiesData.filter(company => {
        const phone = (company.Mobile || '').replace(/[^0-9]/g, '');
        const name = (company.업체명 || '').toLowerCase();
        const address = (company.주소 || '').toLowerCase();
        const region = (company.지역 || '').toLowerCase();

        // 전화번호나 업체명, 주소에서 검색
        return phone.includes(searchNumbers) || 
               name.includes(searchLower) || 
               address.includes(searchLower) ||
               region.includes(searchLower);
    });

    console.log('검색 결과:', results.length, '개');

    // 결과 표시
    if (results.length === 0) {
        resultsDiv.innerHTML = `
            <div class="no-results">
                <div class="no-results-icon">😢</div>
                <div style="font-size: 1.2em; color: #666;">검색 결과가 없습니다</div>
                <div style="margin-top: 10px; font-size: 0.9em; color: #999;">
                    "<strong>${searchInput}</strong>"에 대한 업체를 찾을 수 없습니다
                </div>
            </div>
        `;
        return;
    }

    let html = `<div class="result-count">🔍 <strong>${results.length}개</strong> 업체 검색됨</div>`;

    results.forEach(company => {
        html += `
            <div class="company-card">
                <div class="company-header">
                    <div class="company-name">${company.업체명}</div>
                    <div class="company-badge">${company.Province}</div>
                </div>
                <div class="company-details">
                    <div class="detail-row">
                        <span class="detail-icon">📞</span>
                        <span class="detail-label">전화번호:</span>
                        <span class="detail-value">
                            <a href="tel:${company.Mobile}" class="phone-link">${company.Mobile}</a>
                        </span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-icon">📍</span>
                        <span class="detail-label">지역:</span>
                        <span class="detail-value">${company.Province} ${company.지역}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-icon">🏠</span>
                        <span class="detail-label">주소:</span>
                        <span class="detail-value">${company.주소}</span>
                    </div>
                </div>
            </div>
        `;
    });

    resultsDiv.innerHTML = html;
}
